<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Outer metallic brass ring -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#ba9548" stroke-width="2"/>
  <!-- Inner dark glass/enamel key surface -->
  <circle cx="16" cy="16" r="12" fill="#1b1a18"/>
  <!-- Highlight shine on the glass key -->
  <path d="M 8 10 A 10 10 0 0 1 24 10" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1"/>
  <!-- Center letter "C" in typewriter style -->
  <text x="16" y="21" font-family="Courier Prime, Courier New, monospace" font-size="15" font-weight="bold" fill="#ba9548" text-anchor="middle">C</text>
</svg>